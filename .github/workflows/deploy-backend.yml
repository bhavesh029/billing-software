name: Deploy Backend to Render

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy Backend & Run Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Run Tests
        run: npm run test

      - name: Run Migrations
        env:
          DATABASE_URL: ${{ secrets.PROD_DIRECT_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PROD_DIRECT_DATABASE_URL }}
        run: npm run db:deploy

      - name: Trigger Render Redeploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_WEBHOOK }}"
